<!DOCTYPE html>
<html>
<head>
    <title>Eitekh Portal</title>
    <style>
        /* Make the iframe take up the full screen */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #app-frame { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <iframe id="app-frame" src=""></iframe>

    <script>
        // 2. Put your exact Google Apps Script Web App URL here
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxKRjAYS0wr5OByEf2IT9nEtEorPWKChS0vvUvBjGzZ5PHiwV0tDgxBvYW7ZZxuIfHGSw/exec";

        // 3. Grab the query parameters from the main website's URL
        const urlParams = window.location.search; 

        // 4. Get the iframe element
        const iframe = document.getElementById("app-frame");

        // 5. Set the iframe's src to the GAS URL + the query parameters
        // This automatically passes ?Project=X&SheetName=Y&Layout=Z into the web app
        iframe.src = GAS_WEB_APP_URL + urlParams;
    </script>

</body>
</html>
