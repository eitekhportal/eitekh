<!DOCTYPE html>
<html>
<head>
    <title>Eitekh Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #app-frame { border: none; width: 100%; height: 100%; display: block; }
    </style>
    <meta name="description"
      content="Eitekh Portal provides SAP tools, resources, links, documentation, and utilities for SAP consultants and administrators.">

<meta name="keywords"
      content="SAP, SAP Basis, SAP Fiori, SAP S4HANA, ET Portal">

<meta name="robots" content="index, follow">

<link rel="canonical"
      href="https://eitekhportal.github.io/eitekh/eitekhportal.html">
</head>
<body>
    <iframe id="app-frame" src="" allowfullscreen></iframe>
    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbynmXJrrsjl-5TqDu71DJql_DLKlsZZ5ZI888mWRnn7GCHvFF7qRWZtukEoMzDICqDSNw/exec";

        const urlParams = window.location.search;
        const fullURL = GAS_WEB_APP_URL + urlParams;

        // Mobile browsers block Google auth cookies inside iframes.
        // Detect mobile and redirect the full page instead.
        const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

        if (isMobile) {
            window.location.replace(fullURL);
        } else {
            document.getElementById("app-frame").src = fullURL;
        }
    </script>
</body>
</html>
